name: radio_eirunepe
description: "Aplicativo oficial da Rádio Eirunepé. Ouça ao vivo o Programa Eone Cavalcante e participe da programação."
publish_to: 'none'
version: 1.0.1+9

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter

  just_audio: ^0.9.34
  audio_session: ^0.1.19
  audio_service: ^0.18.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1


flutter_icons:
  android: true
  ios: true
  image_path: "logo_radio.jpg" # Caminho para o arquivo de ícone

flutter:
  uses-material-design: true
  assets:
      - ./logo_radio.jpg
